<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root{--bg:#f7f8fb;--surface:#fff;--soft:#f2f5f9;--line:#e6eaf0;--text:#172033;--muted:#6b7280;--brand:#2563eb;--brand-soft:#eaf1ff;--green:#16a34a;--green-soft:#eaf8ef;--orange:#f59e0b;--orange-soft:#fff6e5;--red:#dc2626;--red-soft:#fff0f0;--purple:#7c3aed;--purple-soft:#f4efff;--sidebar:236px}*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{min-height:100vh;background:var(--bg);color:var(--text);font-family:Roboto,system-ui,-apple-system,"Segoe UI",sans-serif;font-size:.875rem}.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--line);min-height:100vh;padding:1.25rem 1rem;position:fixed;inset:0 auto 0 0}.main{margin-left:var(--sidebar);padding:1.5rem;max-width:calc(100vw - var(--sidebar))}.brand{display:flex;align-items:center;gap:.625rem;font-weight:900;font-size:1.16rem;margin-bottom:1.4rem}.mark{width:2rem;height:2rem;border-radius:.7rem;background:linear-gradient(135deg,var(--brand),#6d5dfc);color:#fff;display:grid;place-items:center}.nav-pks{display:grid;gap:.25rem}.nav-pks button{border:0;background:transparent;color:var(--text);font-weight:700;border-radius:.55rem;min-height:2.55rem;display:flex;align-items:center;gap:.75rem;padding:.55rem .7rem}.nav-pks button i{width:1.125rem;text-align:center;color:var(--muted)}.nav-pks button.active,.nav-pks button:hover{background:var(--brand-soft);color:var(--brand)}.user-card{position:absolute;left:1rem;right:1rem;bottom:1rem;border:1px solid var(--line);border-radius:.8rem;background:var(--surface);padding:.7rem;display:flex;gap:.7rem;align-items:center}.avatar{width:2rem;height:2rem;border-radius:50%;background:var(--soft);color:var(--muted);display:grid;place-items:center;font-weight:900;font-size:.75rem}h1{font-size:1.55rem;font-weight:900;letter-spacing:-.03em;margin:0}.muted{color:var(--muted)}.search{min-height:2.55rem;border:1px solid var(--line);background:var(--surface);border-radius:.75rem;display:flex;align-items:center;gap:.5rem;padding:0 .85rem;color:var(--muted);min-width:min(430px,100%)}.btn{min-height:2.35rem;border-radius:.55rem;font-weight:700;font-size:.8125rem}.btn-primary{--bs-btn-bg:var(--brand);--bs-btn-border-color:var(--brand);--bs-btn-hover-bg:#1d4ed8;--bs-btn-hover-border-color:#1d4ed8}.panel,.stat,.detail,.system,.mini-card{background:var(--surface);border:1px solid var(--line);border-radius:1rem}.panel,.detail,.system,.mini-card{padding:1rem}.stat{padding:1rem;display:flex;align-items:center;gap:.85rem;min-height:6.6rem}.stat strong{font-size:1.42rem;font-weight:900;line-height:1.1}.bubble{width:2.5rem;height:2.5rem;border-radius:.85rem;display:grid;place-items:center;font-size:1.05rem}.blue{color:var(--brand);background:var(--brand-soft)}.green{color:var(--green);background:var(--green-soft)}.orange{color:var(--orange);background:var(--orange-soft)}.purple{color:var(--purple);background:var(--purple-soft)}.view{display:none}.view.active{display:block}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}.chips{display:flex;flex-wrap:wrap;gap:.5rem}.chip{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:.43rem .75rem;color:var(--muted);font-weight:700}.chip.active{background:var(--brand-soft);color:var(--brand);border-color:transparent}.kanban-wrap{overflow-x:visible;max-width:100%}.kanban{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:.75rem;min-width:0}.col-k{background:var(--soft);border-radius:.8rem;padding:.75rem;min-height:390px}.col-k h3{display:flex;justify-content:space-between;font-size:.875rem;font-weight:900;margin-bottom:.75rem}.count{background:#e7ebf1;color:var(--muted);border-radius:999px;padding:.12rem .5rem;font-size:.75rem}.service-card{background:var(--surface);border:1px solid var(--line);border-radius:.8rem;padding:.78rem;margin-bottom:.62rem;cursor:pointer}.service-card:hover,.service-card.active{border-color:rgba(37,99,235,.45)}.service-card strong{display:block;font-weight:900;margin-bottom:.2rem}.service-card small{display:block;color:var(--muted);margin-top:.18rem}.badge-pks{border-radius:999px;font-size:.75rem;font-weight:900;padding:.33rem .6rem}.b-blue{background:var(--brand-soft);color:var(--brand)}.b-green{background:var(--green-soft);color:var(--green)}.b-orange{background:var(--orange-soft);color:var(--orange)}.detail-row{display:flex;justify-content:space-between;gap:1rem;padding:.65rem 0;border-bottom:1px solid var(--line)}.detail-row:last-child{border-bottom:0}.list-row{border:1px solid var(--line);background:var(--surface);border-radius:.8rem;padding:.85rem;display:flex;justify-content:space-between;gap:1rem;align-items:center;cursor:pointer;margin-bottom:.6rem}.quick{border:1px solid var(--line);border-radius:.6rem;min-height:2.8rem;padding:.7rem;display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;background:var(--surface);font-weight:700}.spec{display:flex;justify-content:space-between;gap:1rem;border-bottom:1px solid var(--line);padding:.6rem 0}.service-tabs .nav-link{font-weight:800;color:var(--muted);border:0;border-bottom:2px solid transparent}.service-tabs .nav-link.active{color:var(--brand);border-bottom-color:var(--brand);background:transparent}.timeline-item{border-left:2px solid var(--line);padding-left:.85rem;margin-left:.35rem;margin-bottom:.9rem}.mobile-bar{display:none}.form-label{font-weight:700;font-size:.8125rem}.form-control,.form-select{border-color:var(--line);border-radius:.55rem;min-height:2.5rem;font-size:.875rem}@media(max-width:991.98px){.sidebar{display:none}.main{margin-left:0;padding:1rem;max-width:100vw}.mobile-bar{display:flex;position:sticky;top:0;z-index:1040;background:var(--surface);border-bottom:1px solid var(--line)}.search{min-width:100%}.kanban-wrap{overflow-x:auto}.kanban{grid-template-columns:repeat(5,minmax(190px,1fr));min-width:980px}}
  </style>
</head>
<body>
  <div class="mobile-bar align-items-center justify-content-between px-3 py-2 w-100"><div class="brand mb-0"><span class="mark">P</span> PKSIG</div><button class="btn btn-outline-secondary" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"><i class="bi bi-list"></i></button></div>
  <aside class="sidebar"><div class="brand"><span class="mark">P</span> PKSIG</div><nav class="nav-pks" id="sideNav"></nav><div class="user-card"><span class="avatar">UL</span><div><strong>Uillan Lira</strong><br><small class="muted">Administrador</small></div></div></aside>
  <div class="offcanvas offcanvas-start" id="mobileMenu"><div class="offcanvas-header"><div class="brand mb-0"><span class="mark">P</span> PKSIG</div><button class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body"><nav class="nav-pks" id="mobileNav"></nav></div></div>
  <main class="main"><header class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4"><div><h1 id="title">Bancada</h1><p class="muted mb-0" id="subtitle">Central operacional em uma única página</p></div><div class="search"><i class="bi bi-search"></i><span>Buscar serviços, clientes, equipamentos...</span></div></header><section id="view-workbench" class="view active"></section><section id="view-list" class="view"></section><section id="view-finance" class="view"></section><section id="view-design" class="view"></section></main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const statusMeta={'Entrada':{tag:'Entrada',badge:'b-blue'},'Em avaliação':{tag:'Em avaliação',badge:'b-blue'},'Orçamento':{tag:'Orçamento',badge:'b-orange'},'Aguardando':{tag:'Aguardando',badge:'b-orange'},'Em reparo':{tag:'Em andamento',badge:'b-blue'},'Pronto':{tag:'Pronto',badge:'b-green'}};
    const services=[{id:'OS00032',status:'Entrada',client:'Carlos Silva',phone:'',device:'iPhone 11',problem:'Não liga',entry:'Hoje 09:15',tag:'Entrada',badge:'b-blue',budget:0,cost:0},{id:'OS00031',status:'Entrada',client:'Mariana Costa',phone:'',device:'Notebook Dell',problem:'Sem imagem',entry:'Hoje 10:40',tag:'Entrada',badge:'b-blue',budget:0,cost:0},{id:'OS00029',status:'Em avaliação',client:'Ana Paula',phone:'',device:'iPad Air',problem:'Bateria descarregando',entry:'Há 2h',tag:'Em avaliação',badge:'b-blue',budget:0,cost:0},{id:'OS00028',status:'Em avaliação',client:'Bruno Lima',phone:'',device:'MacBook Air',problem:'Avaliação de placa',entry:'Há 4h',tag:'Em avaliação',badge:'b-blue',budget:0,cost:0},{id:'OS00027',status:'Orçamento',client:'Paulo Renato',phone:'',device:'Motorola G8',problem:'Tela quebrada',entry:'Ontem',tag:'Orçamento',badge:'b-orange',budget:320,cost:120},{id:'OS00025',status:'Orçamento',client:'Clínica Norte',phone:'',device:'Impressora Epson',problem:'Falha na impressão',entry:'Ontem',tag:'Orçamento',badge:'b-orange',budget:250,cost:65},{id:'OS00023',status:'Aguardando',client:'Thiago Martins',phone:'',device:'iPhone 12',problem:'Motivo: peça',entry:'Há 1 dia',tag:'Aguardando peça',badge:'b-orange',budget:430,cost:180},{id:'OS00022',status:'Aguardando',client:'Hamburgueria Norte',phone:'',device:'Epson TM-T20X',problem:'Motivo: pagamento',entry:'Há 2 dias',tag:'Aguardando',badge:'b-orange',budget:180,cost:40},{id:'OS00026',status:'Em reparo',client:'Rafael Lima',phone:'',device:'MacBook Air',problem:'Limpeza de placa + trilhas',entry:'Há 4h',tag:'Em andamento',badge:'b-blue',budget:430,cost:180},{id:'OS00020',status:'Em reparo',client:'Luana Melo',phone:'',device:'Samsung S20',problem:'Reparo de carga',entry:'Há 3 dias',tag:'Em andamento',badge:'b-blue',budget:220,cost:75},{id:'OS00021',status:'Pronto',client:'Viviane Rocha',phone:'',device:'iPhone SE',problem:'Aguardando retirada',entry:'Hoje',tag:'Pronto',badge:'b-green',budget:180,cost:45},{id:'OS00019',status:'Pronto',client:'João Pedro',phone:'',device:'Notebook Acer',problem:'Teste concluído',entry:'Ontem',tag:'Pronto',badge:'b-green',budget:260,cost:90}];
    const nav=[['workbench','Bancada','bi-kanban','Central operacional em uma única página'],['list','Serviços','bi-tools','Lista simples de serviços'],['finance','Financeiro','bi-currency-dollar','Resumo financeiro contextual'],['design','Design System','bi-grid-1x2','Padrões visuais e componentes']];let selected=services[8];
    function money(v){return 'R$ '+Number(v||0).toFixed(2).replace('.',',')}function nextId(){let n=Math.max(...services.map(s=>parseInt(String(s.id).replace('OS',''),10)))+1;return 'OS'+String(n).padStart(5,'0')}function nowLabel(){return 'Agora'}function applyStatus(s,status){const m=statusMeta[status]||statusMeta['Entrada'];s.status=status;s.tag=m.tag;s.badge=m.badge}
    function ensureEvaluation(s){if(!s.evaluation){s.evaluation={reported:s.problem,diagnosis:s.status==='Entrada'?'Aguardando avaliação técnica.':'Avaliação técnica em andamento.',procedure:'',warranty:'90 dias após a entrega',notes:''}}return s.evaluation}function ensureBudget(s){if(!s.budgetData){s.budgetData={labor:Math.max((s.budget||0)-(s.cost||0),0),parts:s.cost||0,discount:0,status:s.budget>0?'Pendente':'Pendente'}}return s.budgetData}function ensureCosts(s){if(!s.costItems){s.costItems=s.cost>0?[{category:'Peça/insumo',value:s.cost,note:'Custo inicial de exemplo'}]:[]}return s.costItems}
    function serviceCard(s){return `<div class="service-card ${s.id===selected.id?'active':''}" data-id="${s.id}"><strong>#${s.id}</strong>${s.client}<small>${s.device}</small><small>${s.problem}</small><span class="badge-pks ${s.badge} mt-2">${s.tag}</span></div>`}
    function detail(){return `<div class="detail"><div class="d-flex justify-content-between align-items-center mb-3"><div><strong>#${selected.id}</strong><br><small class="muted">Serviço selecionado</small></div><span class="badge-pks ${selected.badge}">${selected.tag}</span></div><div class="detail-row"><span class="muted">Cliente</span><strong>${selected.client}</strong></div><div class="detail-row"><span class="muted">Equipamento</span><strong>${selected.device}</strong></div><div class="detail-row"><span class="muted">Status</span><strong>${selected.status}</strong></div><div class="detail-row"><span class="muted">Problema</span><strong>${selected.problem}</strong></div><div class="detail-row"><span class="muted">Orçamento</span><strong>${money(selected.budget)}</strong></div><div class="detail-row"><span class="muted">Custos</span><strong>${money(selected.cost)}</strong></div><div class="d-grid gap-2 mt-3"><button class="btn btn-primary" data-bs-toggle="offcanvas" data-bs-target="#serviceDrawer">Abrir serviço</button><button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#statusModal">Atualizar status</button></div></div>`}
    function renderWorkbench(){const statuses=Object.keys(statusMeta);document.getElementById('view-workbench').innerHTML=`<div class="row g-3 mb-3"><div class="col-12 col-sm-6 col-xl-3"><div class="stat"><span class="bubble blue"><i class="bi bi-kanban"></i></span><div><strong>${services.length}</strong><br><small class="muted">Serviços ativos</small></div></div></div><div class="col-12 col-sm-6 col-xl-3"><div class="stat"><span class="bubble orange"><i class="bi bi-pause-circle"></i></span><div><strong>${services.filter(s=>s.status==='Aguardando').length}</strong><br><small class="muted">Aguardando</small></div></div></div><div class="col-12 col-sm-6 col-xl-3"><div class="stat"><span class="bubble green"><i class="bi bi-check2-circle"></i></span><div><strong>${services.filter(s=>s.status==='Pronto').length}</strong><br><small class="muted">Prontos</small></div></div></div><div class="col-12 col-sm-6 col-xl-3"><div class="stat"><span class="bubble purple"><i class="bi bi-cash-stack"></i></span><div><strong>${money(services.reduce((a,s)=>a+s.budget,0))}</strong><br><small class="muted">Em orçamento</small></div></div></div></div><div class="panel mb-3"><div class="toolbar"><div><h2 class="h6 fw-bold mb-1">Bancada operacional</h2><p class="muted mb-0">Serviços ativos por status. Clique no card para ver detalhes.</p></div><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newService"><i class="bi bi-plus-lg"></i> Novo Serviço</button></div><div class="chips mt-3"><button class="chip active">Todos</button><button class="chip">Hoje</button><button class="chip">Aguardando</button><button class="chip">Prontos</button></div></div><div class="row g-3"><div class="col-12 col-xxl-9"><div class="kanban-wrap"><div class="kanban">${statuses.slice(0,5).map(st=>`<div class="col-k"><h3>${st}<span class="count">${services.filter(s=>s.status===st).length}</span></h3>${services.filter(s=>s.status===st).map(serviceCard).join('')}</div>`).join('')}</div></div></div><div class="col-12 col-xxl-3">${detail()}</div></div>`}
    function renderList(){document.getElementById('view-list').innerHTML=`<div class="panel mb-3"><div class="toolbar"><div><h2 class="h6 fw-bold mb-1">Serviços</h2><p class="muted mb-0">Lista enxuta dos serviços.</p></div><button class="btn btn-outline-secondary"><i class="bi bi-funnel"></i> Filtros</button></div></div><div class="row g-3"><div class="col-lg-8">${services.map(s=>`<div class="list-row" data-id="${s.id}"><div><strong>#${s.id}</strong><br><span>${s.client}</span><small class="muted d-block">${s.device} • ${s.problem}</small></div><span class="badge-pks ${s.badge}">${s.status}</span></div>`).join('')}</div><div class="col-lg-4">${detail()}</div></div>`}
    function renderFinance(){document.getElementById('view-finance').innerHTML=`<div class="row g-3"><div class="col-md-4"><div class="stat"><span class="bubble green"><i class="bi bi-arrow-down-circle"></i></span><div><strong>${money(services.reduce((a,s)=>a+s.budget,0))}</strong><br><small class="muted">Entradas previstas</small></div></div></div><div class="col-md-4"><div class="stat"><span class="bubble orange"><i class="bi bi-arrow-up-circle"></i></span><div><strong>${money(services.reduce((a,s)=>a+s.cost,0))}</strong><br><small class="muted">Custos lançados</small></div></div></div><div class="col-md-4"><div class="stat"><span class="bubble blue"><i class="bi bi-graph-up"></i></span><div><strong>${money(services.reduce((a,s)=>a+s.budget-s.cost,0))}</strong><br><small class="muted">Resultado previsto</small></div></div></div></div><div class="panel mt-3"><h2 class="h6 fw-bold">Movimentações recentes</h2><div class="quick">Pagamento #OS00026 <strong>${money(430)}</strong></div><div class="quick">Compra de peça #OS00023 <strong>${money(180)}</strong></div><div class="quick">Insumo avulso <strong>${money(45)}</strong></div></div>`}
    function renderDesign(){document.getElementById('view-design').innerHTML=`<div class="row g-3"><div class="col-lg-4"><div class="system"><h2>Roadmap funcional</h2><p class="muted">A demo será evoluída com dados fake antes da API.</p><div class="spec"><span>1</span><strong>Novo Serviço</strong></div><div class="spec"><span>2</span><strong>Atualizar Status</strong></div><div class="spec"><span>3</span><strong>Abrir Serviço</strong></div><div class="spec"><span>4</span><strong>Orçamento e Custos</strong></div></div></div><div class="col-lg-4"><div class="system"><h2>Financeiro do serviço</h2><p class="muted">A aba Financeiro permite editar orçamento e adicionar custos fake.</p><div class="spec"><span>Orçamento</span><strong>mão de obra, peças, desconto</strong></div><div class="spec"><span>Custos</span><strong>categoria, valor, observação</strong></div></div></div><div class="col-lg-4"><div class="system"><h2>AI e SPA</h2><p class="muted">Uma única tela operacional com contexto dinâmico.</p><div class="spec"><span>Centro</span><strong>Serviço</strong></div><div class="spec"><span>Detalhes</span><strong>Drawer lateral</strong></div></div></div></div>`}
    function renderServiceFull(){const ev=ensureEvaluation(selected),b=ensureBudget(selected),costs=ensureCosts(selected);document.getElementById('serviceDrawerTitle').textContent='#'+selected.id+' • '+selected.client;document.getElementById('serviceDrawerSubtitle').textContent=selected.device+' · '+selected.status;document.getElementById('serviceDrawerBody').innerHTML=`<div class="d-flex justify-content-between align-items-center mb-3"><span class="badge-pks ${selected.badge}">${selected.tag}</span><small class="muted">Entrada: ${selected.entry}</small></div><ul class="nav service-tabs mb-3"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabResumo" type="button">Resumo</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabTecnico" type="button">Técnico</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabFinanceiro" type="button">Financeiro</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabHistorico" type="button">Histórico</button></li></ul><div class="tab-content"><div class="tab-pane fade show active" id="tabResumo"><div class="row g-3"><div class="col-md-6"><div class="mini-card"><h6 class="fw-bold">Cliente</h6><div class="detail-row"><span class="muted">Nome</span><strong>${selected.client}</strong></div><div class="detail-row"><span class="muted">Telefone</span><strong>${selected.phone||'Não informado'}</strong></div></div></div><div class="col-md-6"><div class="mini-card"><h6 class="fw-bold">Equipamento</h6><div class="detail-row"><span class="muted">Descrição</span><strong>${selected.device}</strong></div><div class="detail-row"><span class="muted">Defeito</span><strong>${selected.problem}</strong></div></div></div></div></div><div class="tab-pane fade" id="tabTecnico"><form id="evaluationForm" class="mini-card"><div class="d-flex justify-content-between align-items-start gap-3 mb-3"><div><h6 class="fw-bold mb-1">Laudo / avaliação</h6><p class="muted mb-0">Campos editáveis salvos apenas nesta sessão fake.</p></div><button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Salvar avaliação</button></div><div id="evaluationSaved" class="alert alert-success py-2 d-none">Avaliação salva nesta sessão.</div><label class="form-label" for="evalReported">Defeito relatado</label><textarea class="form-control mb-3" id="evalReported" rows="2">${ev.reported}</textarea><label class="form-label" for="evalDiagnosis">Diagnóstico técnico</label><textarea class="form-control mb-3" id="evalDiagnosis" rows="3">${ev.diagnosis}</textarea><label class="form-label" for="evalProcedure">Procedimento / solução proposta</label><textarea class="form-control mb-3" id="evalProcedure" rows="3">${ev.procedure}</textarea><label class="form-label" for="evalWarranty">Garantia</label><input class="form-control mb-3" id="evalWarranty" value="${ev.warranty}"><label class="form-label" for="evalNotes">Observações internas</label><textarea class="form-control" id="evalNotes" rows="3">${ev.notes}</textarea></form></div><div class="tab-pane fade" id="tabFinanceiro"><div class="row g-3 mb-3"><div class="col-md-4"><div class="mini-card"><small class="muted">Orçamento</small><h5 class="fw-bold mb-0">${money(selected.budget)}</h5></div></div><div class="col-md-4"><div class="mini-card"><small class="muted">Custos</small><h5 class="fw-bold mb-0">${money(selected.cost)}</h5></div></div><div class="col-md-4"><div class="mini-card"><small class="muted">Resultado</small><h5 class="fw-bold mb-0">${money(selected.budget-selected.cost)}</h5></div></div></div><form id="budgetForm" class="mini-card mb-3"><div class="d-flex justify-content-between align-items-start gap-3 mb-3"><div><h6 class="fw-bold mb-1">Orçamento</h6><p class="muted mb-0">Edite valores e salve nesta sessão fake.</p></div><button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Salvar orçamento</button></div><div id="budgetSaved" class="alert alert-success py-2 d-none">Orçamento salvo.</div><div class="row g-3"><div class="col-md-6"><label class="form-label">Mão de obra</label><input id="budgetLabor" type="number" step="0.01" class="form-control" value="${b.labor}"></div><div class="col-md-6"><label class="form-label">Peças</label><input id="budgetParts" type="number" step="0.01" class="form-control" value="${b.parts}"></div><div class="col-md-6"><label class="form-label">Desconto</label><input id="budgetDiscount" type="number" step="0.01" class="form-control" value="${b.discount}"></div><div class="col-md-6"><label class="form-label">Status</label><select id="budgetStatus" class="form-select"><option ${b.status==='Pendente'?'selected':''}>Pendente</option><option ${b.status==='Aprovado'?'selected':''}>Aprovado</option><option ${b.status==='Recusado'?'selected':''}>Recusado</option></select></div></div></form><form id="costForm" class="mini-card"><div class="d-flex justify-content-between align-items-start gap-3 mb-3"><div><h6 class="fw-bold mb-1">Adicionar custo</h6><p class="muted mb-0">Registre saídas vinculadas ao serviço.</p></div><button class="btn btn-outline-secondary" type="submit"><i class="bi bi-plus-lg"></i> Adicionar</button></div><div class="row g-3"><div class="col-md-4"><label class="form-label">Categoria</label><select id="costCategory" class="form-select"><option>Peça</option><option>Insumo</option><option>Terceirização</option><option>Transporte</option><option>Outro</option></select></div><div class="col-md-4"><label class="form-label">Valor</label><input id="costValue" type="number" step="0.01" class="form-control" value="0"></div><div class="col-md-4"><label class="form-label">Observação</label><input id="costNote" class="form-control" placeholder="Ex.: conector de carga"></div></div><div class="mt-3">${costs.length?costs.map(c=>`<div class="quick">${c.category} <span>${c.note||'Sem observação'}</span><strong>${money(c.value)}</strong></div>`).join(''):'<p class="muted mb-0">Nenhum custo lançado.</p>'}</div></form></div><div class="tab-pane fade" id="tabHistorico"><div class="mini-card"><h6 class="fw-bold">Histórico</h6><div class="timeline-item"><strong>Serviço criado</strong><br><small class="muted">${selected.entry}</small></div><div class="timeline-item"><strong>Status atual: ${selected.status}</strong><br><small class="muted">Atualizado nesta sessão fake</small></div><div class="timeline-item"><strong>Financeiro</strong><br><small class="muted">Orçamento: ${money(selected.budget)} · Custos: ${money(selected.cost)}</small></div></div></div></div>`}
    function renderAll(){renderWorkbench();renderList();renderFinance();renderDesign();bindCards()}
    function bindCards(){document.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{selected=services.find(s=>s.id===el.dataset.id)||selected;renderAll()})}
    function openView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===id));let item=nav.find(n=>n[0]===id);document.getElementById('title').textContent=item[1];document.getElementById('subtitle').textContent=item[3];let off=bootstrap.Offcanvas.getInstance(document.getElementById('mobileMenu'));if(off)off.hide()}
    function makeNav(){let html=nav.map((n,i)=>`<button class="${i===0?'active':''}" data-view="${n[0]}"><i class="bi ${n[2]}"></i>${n[1]}</button>`).join('');sideNav.innerHTML=html;mobileNav.innerHTML=html;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>openView(b.dataset.view))}
    function createServiceFromForm(){const client=clientName.value.trim()||'Cliente sem nome',phone=clientPhone.value.trim(),category=deviceCategory.value,brand=deviceBrand.value.trim(),model=deviceModel.value.trim(),problem=serviceProblem.value.trim()||'Defeito não informado',device=[brand,model].filter(Boolean).join(' ')||category;const service={id:nextId(),status:'Entrada',client,phone,device,problem,entry:nowLabel(),tag:'Entrada',badge:'b-blue',budget:0,cost:0};services.unshift(service);selected=service;renderAll();openView('workbench');newServiceForm.reset();bootstrap.Modal.getInstance(newService).hide()}
    function prepareStatusModal(){statusServiceId.textContent='#'+selected.id+' • '+selected.client;serviceStatus.value=selected.status;statusNote.value=''}function updateSelectedStatus(){applyStatus(selected,serviceStatus.value);renderAll();openView('workbench');bootstrap.Modal.getInstance(statusModal).hide()}
    function saveEvaluation(){selected.evaluation={reported:evalReported.value.trim(),diagnosis:evalDiagnosis.value.trim(),procedure:evalProcedure.value.trim(),warranty:evalWarranty.value.trim(),notes:evalNotes.value.trim()};evaluationSaved.classList.remove('d-none');setTimeout(()=>evaluationSaved.classList.add('d-none'),1800)}
    function saveBudget(){const b=ensureBudget(selected);b.labor=Number(budgetLabor.value||0);b.parts=Number(budgetParts.value||0);b.discount=Number(budgetDiscount.value||0);b.status=budgetStatus.value;selected.budget=Math.max(b.labor+b.parts-b.discount,0);renderAll();renderServiceFull();document.querySelector('[data-bs-target="#tabFinanceiro"]').click();budgetSaved.classList.remove('d-none');setTimeout(()=>budgetSaved.classList.add('d-none'),1800)}
    function addCost(){const value=Number(costValue.value||0);if(value<=0)return;ensureCosts(selected).push({category:costCategory.value,value,note:costNote.value.trim()});selected.cost=ensureCosts(selected).reduce((a,c)=>a+Number(c.value||0),0);renderAll();renderServiceFull();document.querySelector('[data-bs-target="#tabFinanceiro"]').click()}
    makeNav();renderAll();document.addEventListener('submit',e=>{if(e.target.id==='newServiceForm'){e.preventDefault();createServiceFromForm()}if(e.target.id==='statusForm'){e.preventDefault();updateSelectedStatus()}if(e.target.id==='evaluationForm'){e.preventDefault();saveEvaluation()}if(e.target.id==='budgetForm'){e.preventDefault();saveBudget()}if(e.target.id==='costForm'){e.preventDefault();addCost()}});document.addEventListener('show.bs.modal',e=>{if(e.target.id==='statusModal')prepareStatusModal()});document.addEventListener('show.bs.offcanvas',e=>{if(e.target.id==='serviceDrawer')renderServiceFull()});
  </script>
  <div class="modal fade" id="newService" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><form id="newServiceForm" class="modal-content"><div class="modal-header"><h5 class="modal-title fw-bold">Novo Serviço</h5><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label" for="clientName">Cliente</label><input id="clientName" class="form-control" placeholder="Buscar ou informar cliente" required></div><div class="col-md-6"><label class="form-label" for="clientPhone">Telefone</label><input id="clientPhone" class="form-control" placeholder="WhatsApp"></div><div class="col-md-4"><label class="form-label" for="deviceCategory">Categoria</label><select id="deviceCategory" class="form-select"><option>Celular</option><option>Notebook</option><option>Impressora</option><option>Tablet</option><option>Computador</option></select></div><div class="col-md-4"><label class="form-label" for="deviceBrand">Marca</label><input id="deviceBrand" class="form-control" placeholder="Apple, Samsung..."></div><div class="col-md-4"><label class="form-label" for="deviceModel">Modelo</label><input id="deviceModel" class="form-control" placeholder="Modelo"></div><div class="col-12"><label class="form-label" for="serviceProblem">Defeito informado</label><textarea id="serviceProblem" class="form-control" rows="3" placeholder="Descreva o problema informado pelo cliente" required></textarea></div></div></div><div class="modal-footer"><button class="btn btn-light border" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary" type="submit">Salvar serviço</button></div></form></div></div>
  <div class="modal fade" id="statusModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><form id="statusForm" class="modal-content"><div class="modal-header"><div><h5 class="modal-title fw-bold">Atualizar status</h5><small class="muted" id="statusServiceId"></small></div><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><label class="form-label" for="serviceStatus">Novo status</label><select id="serviceStatus" class="form-select mb-3"><option>Entrada</option><option>Em avaliação</option><option>Orçamento</option><option>Aguardando</option><option>Em reparo</option><option>Pronto</option></select><label class="form-label" for="statusNote">Observação rápida</label><textarea id="statusNote" class="form-control" rows="3" placeholder="Opcional. Ex.: aguardando peça, cliente aprovou orçamento..."></textarea></div><div class="modal-footer"><button class="btn btn-light border" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary" type="submit">Salvar status</button></div></form></div></div>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="serviceDrawer" style="width:min(760px,100vw)"><div class="offcanvas-header border-bottom"><div><h5 class="offcanvas-title fw-bold" id="serviceDrawerTitle">Serviço</h5><small class="muted" id="serviceDrawerSubtitle"></small></div><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div><div class="offcanvas-body" id="serviceDrawerBody"></div></div>
</body>
</html>
