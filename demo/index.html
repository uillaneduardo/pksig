<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PKSIG Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --pks-bg: #f7f8fb;
      --pks-surface: #ffffff;
      --pks-surface-soft: #f2f5f9;
      --pks-line: #e6eaf0;
      --pks-text: #172033;
      --pks-muted: #6b7280;
      --pks-primary: #2563eb;
      --pks-primary-soft: #eaf1ff;
      --pks-success: #16a34a;
      --pks-success-soft: #eaf8ef;
      --pks-warning: #f59e0b;
      --pks-warning-soft: #fff6e5;
      --pks-danger: #dc2626;
      --pks-danger-soft: #fff0f0;
      --pks-purple: #7c3aed;
      --pks-purple-soft: #f4efff;
      --pks-radius-sm: .5rem;
      --pks-radius-md: .75rem;
      --pks-radius-lg: 1rem;
      --pks-shadow: 0 10px 30px rgba(15, 23, 42, .045);
      --pks-sidebar: 248px;
    }

    body {
      min-height: 100vh;
      font-family: Roboto, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--pks-bg);
      color: var(--pks-text);
      font-size: .875rem;
    }

    .sidebar {
      width: var(--pks-sidebar);
      background: var(--pks-surface);
      border-right: 1px solid var(--pks-line);
      min-height: 100vh;
      padding: 1.25rem 1rem;
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 1020;
    }

    .main-area {
      margin-left: var(--pks-sidebar);
      padding: 1.5rem;
      max-width: 1480px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .625rem;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -.02em;
      margin-bottom: 1.5rem;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      border-radius: .75rem;
      background: linear-gradient(135deg, var(--pks-primary), #6d5dfc);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .nav-pks { display: grid; gap: .25rem; }

    .nav-pks .nav-link {
      color: var(--pks-text);
      font-weight: 700;
      border-radius: var(--pks-radius-sm);
      min-height: 2.75rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .625rem .75rem;
      cursor: pointer;
    }

    .nav-pks .nav-link i {
      width: 1.125rem;
      text-align: center;
      color: var(--pks-muted);
      font-size: 1rem;
    }

    .nav-pks .nav-link:hover,
    .nav-pks .nav-link.active {
      background: var(--pks-primary-soft);
      color: var(--pks-primary);
    }

    .nav-pks .nav-link.active i { color: var(--pks-primary); }

    .user-card {
      position: absolute;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      border: 1px solid var(--pks-line);
      border-radius: var(--pks-radius-md);
      background: var(--pks-surface);
      padding: .75rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .avatar {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--pks-surface-soft);
      color: var(--pks-muted);
      font-weight: 900;
      font-size: .75rem;
    }

    .page-title h1 {
      font-size: 1.625rem;
      font-weight: 900;
      letter-spacing: -.03em;
      margin: 0;
    }

    .page-title p { color: var(--pks-muted); margin: .25rem 0 0; }

    .search-box {
      min-height: 2.625rem;
      border: 1px solid var(--pks-line);
      background: var(--pks-surface);
      border-radius: var(--pks-radius-md);
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 0 .875rem;
      color: var(--pks-muted);
      min-width: min(420px, 100%);
    }

    .btn {
      min-height: 2.375rem;
      border-radius: var(--pks-radius-sm);
      font-weight: 700;
      font-size: .8125rem;
      padding-inline: .875rem;
    }

    .btn-primary {
      --bs-btn-bg: var(--pks-primary);
      --bs-btn-border-color: var(--pks-primary);
      --bs-btn-hover-bg: #1d4ed8;
      --bs-btn-hover-border-color: #1d4ed8;
    }

    .page { display: none; }
    .page.active { display: block; }

    .panel,
    .stat-card,
    .system-card {
      background: var(--pks-surface);
      border: 1px solid var(--pks-line);
      border-radius: var(--pks-radius-lg);
    }

    .service-drawer {
      box-shadow: none !important;
      background: transparent;
    }
  </style>
</head>
<body></body>
</html>
